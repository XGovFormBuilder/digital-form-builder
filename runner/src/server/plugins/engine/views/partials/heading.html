{% if sectionTitle and (sectionTitle !== pageTitle) %}
  <h2 class="govuk-caption-l govuk-!-margin-top-0" id="section-title">{{sectionTitle}}</h2>
{% endif %}
{% if showTitle %}
  <h1 class="govuk-heading-l">
    {{pageTitle}}
  </h1>
{% endif %}
{% if page.subtitle %}
    <p class="govuk-hint">{{ page.subtitle }}</p>
{% endif %}
